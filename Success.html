<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful</title>

<style>

body{
background:#000;
color:white;
font-family: "inter", Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
}

.checkmark-circle{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #00ff40;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:25px;
animation:circle 0.6s ease-in-out forwards;
}

.checkmark{
font-size:60px;
color:#00ff40;
opacity:0;
animation:tick 0.5s ease forwards;
animation-delay:0.6s;
}

@keyframes circle{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

@keyframes tick{
0%{opacity:0; transform:scale(0);}
100%{opacity:1; transform:scale(1);}
}

.title{
font-size:28px;
font-weight:900;
margin-bottom:8px;
font-family: "Plus jakarta sans", jakarta, serif;
}

.subtitle{
color:#aaa;
margin-bottom:25px;
}

.redirect{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
margin-top:10px;
text-align:center;
}

.spinner{
width:16px;
height:16px;
border:3px solid rgba(255,255,255,0.25);
border-top:3px solid #ffffff;
border-radius:50%;
animation:spin 0.8s linear infinite;
flex-shrink:0;
margin-left:-12px;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
  }

</style>
</head>

<body>

<div class="checkmark-circle">
<div class="checkmark">✔</div>
</div>

<div class="title">PAYMENT SUCCESSFUL</div>
<div class="subtitle">Your payment has been confirmed.</div>

<div class="spinner"></div>
  <div class="redirect">
  <span>Redirecting to Telegram to complete your enrollment...</span>
</div>
  
<script>

// get stored user data
const userData = JSON.parse(localStorage.getItem("celesteUser")) || {};

// get paystack reference
const params = new URLSearchParams(window.location.search);
const reference = params.get("reference") || "N/A";

// build telegram message
const message =
`🚀 Hello Coach, I have made my payment for Celeste activation, Here are my details:

👤 Name: ${userData.fullName}
🆔 Username: ${userData.username}
📧 Email: ${userData.email}
📱 Phone: ${userData.phone}
💎 Plan: ${userData.plan}

🧾 Ref: ${reference}

✅ Status: PAID VIA PAYSTACK CHECK OUT!`;
// telegram link
const telegramLink =
"https://t.me/Kjfinance02?text=" + encodeURIComponent(message);

// redirect after 3 seconds
setTimeout(()=>{
window.location.href = telegramLink;
},5000);

</script>

</body>
</html>
