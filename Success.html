<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | Glamour Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Cinzel:wght@700;900&display=swap');
    
    :root {
        --glam-gold: #d4af37;
        --gold-grad: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
        --glam-black: #050505;
    }

    body {
        background-color: var(--glam-black);
        color: white;
        font-family: 'Plus Jakarta Sans', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
    position: relative;
    text-align: center;
    padding: 50px 20px; /* Reduced padding for mobile */
    background: rgba(20, 20, 20, 0.8);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 30px;
    width: 90%;         /* Ensures it doesn't hit screen edges */
    max-width: 400px;   /* Keeps it tight and professional */
    margin: auto;
}

    /* THE GLASS CIRCLE */
    .checkmark-box {
        width: 130px;
        height: 130px;
        margin: 0 auto 40px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        border: 2px solid rgba(212, 175, 55, 0.3);
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
    }

    /* THE BOLD TICK */
    .checkmark-svg {
        width: 75px;
        height: 75px;
        fill: none;
        stroke: #f5e050; 
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        filter: drop-shadow(0 0 12px rgba(245, 224, 80, 0.6));
        animation: draw-tick 1.2s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        animation-delay: 0.3s;
    }

    @keyframes draw-tick {
        to { stroke-dashoffset: 0; }
    }

    .title {
        font-family: 'Cinzel', serif;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 1px;
        margin-bottom: 15px;
        background: var(--gold-grad);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
    }

    .subtitle {
        color: rgba(255, 255, 255, 0.4);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 40px;
    }

    /* FIXED REDIRECT BOX & SPINNER */
    /* FIXED: Container now wraps text properly on small screens */
    .redirect-box {
    margin-top: 40px;
    background: rgba(212, 175, 55, 0.05);
    padding: 20px;
    border-radius: 20px;
    border: 1px dashed rgba(212, 175, 55, 0.3);
    
    /* FIX: This forces the spinner and text to the center */
    display: flex;
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
    gap: 15px;
}

    /* FIXED: Spinner is locked to a perfect circle and won't squash */
    .spinner {
        width: 22px;
        height: 22px;
        flex: 0 0 22px; /* This locks the size: Don't grow, Don't shrink, stay 22px */
        border: 2.5px solid rgba(212, 175, 55, 0.1);
        border-top: 2.5px solid var(--glam-gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    /* FIXED: Text now breaks naturally to the next line */
    .redirect-text {
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.8);
    font-weight: 500;
    text-align: center;
    margin: 0;
}

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="checkmark-box">
            <svg class="checkmark-svg" viewBox="0 0 52 52">
                <path d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>

        <div class="title">Payment Successful</div>
        <div class="subtitle">Your payment for glamour account activation has been Verified!
            <i class="fas fa-thumbs-up" style="margin-left: 5px; color: #f5e050;"></i>
        </div>

        <div class="redirect-box">
            <div class="spinner"></div>
            <div class="redirect-text">Redirecting to Telegram to complete your activation...
        </div>
    </div>
</body>
  
<script>
window.onload = function() {
    // 1. Pull the bundle AFTER the page has fully loaded
    const userData = JSON.parse(localStorage.getItem("glamour_pending_user")) || {};

    // 2. Grab the Ref that was saved during the Review step
    const reference = userData.customRef || "N/A";

    // 3. Prepare the message with your fixed amount
    const message = 
`🚀 Hello Coach, I have made my payment for Glamour activation, Here are my details:

👤 Name: ${userData.fullName || 'N/A'}
🆔 Username: ${userData.username || 'N/A'}
📧 Email: ${userData.email || 'N/A'}
📱 Phone: ${userData.phone || 'N/A'}
💰 Amount Paid: ₦14,000

💳 Ref: ${reference}

PAID VIA KORA GATEWAY ✅

Kindly confirm and activate...`;

    // 4. Redirect to Telegram after 5 seconds
    setTimeout(() => {
        window.location.href = `https://t.me/glamourofficial0?text=${encodeURIComponent(message)}`;
    }, 5000);
};

</script>
</body>
</html>
