<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | Glamour Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Cinzel:wght@700;900&display=swap');
    
    :root {
        --glam-gold: #d4af37;
        --gold-grad: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
        --glam-black: #050505;
    }

    body {
        background-color: var(--glam-black);
        color: white;
        font-family: 'Plus Jakarta Sans', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        position: relative;
        text-align: center;
        padding: 50px 40px;
        background: rgba(20, 20, 20, 0.4);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(212, 175, 55, 0.15);
        border-radius: 50px;
        max-width: 360px;
        width: 85%;
        box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }

    /* THE GLASS CIRCLE */
    .checkmark-box {
        width: 130px;
        height: 130px;
        margin: 0 auto 40px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        border: 2px solid rgba(212, 175, 55, 0.3);
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
    }

    /* THE BOLD TICK */
    .checkmark-svg {
        width: 75px;
        height: 75px;
        fill: none;
        stroke: #f5e050; 
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        filter: drop-shadow(0 0 12px rgba(245, 224, 80, 0.6));
        animation: draw-tick 1.2s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        animation-delay: 0.3s;
    }

    @keyframes draw-tick {
        to { stroke-dashoffset: 0; }
    }

    .title {
        font-family: 'Cinzel', serif;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 1px;
        margin-bottom: 15px;
        background: var(--gold-grad);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
    }

    .subtitle {
        color: rgba(255, 255, 255, 0.4);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 40px;
    }

    /* FIXED REDIRECT BOX & SPINNER */
    /* FIXED: Container now wraps text properly on small screens */
    .redirect-box {
        display: flex; 
        align-items: center;
        justify-content: center;
        gap: 15px;
        background: rgba(255,255,255,0.03);
        padding: 18px 25px;
        border-radius: 25px; /* Changed to match your dashboard card style */
        border: 1px solid rgba(255,255,255,0.05);
        width: 100%; /* Fills the container width */
        max-width: 300px;
        margin: 0 auto;
        flex-wrap: wrap; /* Allows text to drop to next line if needed */
    }

    /* FIXED: Spinner is locked to a perfect circle and won't squash */
    .spinner {
        width: 22px;
        height: 22px;
        flex: 0 0 22px; /* This locks the size: Don't grow, Don't shrink, stay 22px */
        border: 2.5px solid rgba(212, 175, 55, 0.1);
        border-top: 2.5px solid var(--glam-gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    /* FIXED: Text now breaks naturally to the next line */
    .redirect-text {
        font-size: 10px;
        font-weight: 800;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        line-height: 1.4;
        flex: 1; /* Takes up remaining space */
        min-width: 150px; /* Forces break if space is too small */
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="checkmark-box">
            <svg class="checkmark-svg" viewBox="0 0 52 52">
                <path d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>

        <div class="title">Payment Successful</div>
        <div class="subtitle">Your payment for glamour account activation has been Verified!
            <i class="fas fa-thumbs-up" style="margin-left: 5px; color: #f5e050;"></i>
        </div>

        <div class="redirect-box">
            <div class="spinner"></div>
            <div class="redirect-text">Redirecting to Telegram to complete your activation...
            
            </div>
        </div>
    </div>
</body>
  
<script>
// Pull the bundle we just made
const userData = JSON.parse(localStorage.getItem("glamour_pending_user")) || {};
const params = new URLSearchParams(window.location.search);
const reference = params.get("reference") || "N/A";

// Your exact message format
const message = 
`🚀 Hello Coach, I have made my payment for Glamour activation, Here are my details:

👤 Name: ${userData.fullName}
🆔 Username: ${userData.username}
📧 Email: ${userData.email}
📱 Phone: ${userData.phone}
💰 Amount Paid: ${userData.amount}

💳 Ref: ${reference}

PAID VIA PAYSTACK GATEWAY ✅

Kindly confirm and activate my account.`;

// redirect after 3 seconds
setTimeout(()=>{
window.location.href = `https://t.me/glamourofficial0?text=${encodeURIComponent(message)}`;
},5000);

</script>

</body>
</html>
